<!doctype html>
<html lang="en" style="background: #07090f;">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, minimal-ui" />
    <meta name="theme-color" content="#07090f" />
    <script>
      // Update theme-color and backgrounds before paint
      try {
        var t = localStorage.getItem('treasury-theme');
        var bg = t === 'light' ? '#f8f7f4' : '#07090f';
        document.querySelector('meta[name="theme-color"]').content = bg;
        document.documentElement.style.background = bg;
        document.documentElement.setAttribute('data-theme', t || 'dark');
      } catch(e) {}
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="background: #07090f;">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
